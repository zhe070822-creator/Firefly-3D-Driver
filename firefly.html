<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>猫耳流萤 - 3D Skeleton Driver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    #viewer { width: 100vw; height: 100vh; position: relative; }
    #viewer canvas { display: block; }
    #info { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 6px 10px; border-radius: 4px; font-size: 12px; color: #aaa; z-index: 10; }
    #leftPanel { position: absolute; top: 36px; left: 8px; z-index: 25; display: flex; flex-direction: column; gap: 4px; }
    #leftPanel button { border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; color: #fff; }
    #resetCamBtn { background: rgba(0,0,0,0.7); color: #aaa; }
    #toggleBtn { position: absolute; top: 8px; right: 8px; z-index: 30; background: #e94560; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 14px; }
    #flyBtn { background: #2980b9; }
    #flySpeed { background: rgba(0,0,0,0.5); color: #fff; padding: 3px 6px; border-radius: 3px; font-size: 10px; user-select: none; }
    #animBtn { background: #27ae60; }
    #lightPanel { background: rgba(0,0,0,0.7); color: #eee; padding: 6px 8px; border-radius: 3px; font-size: 10px; min-width: 140px; max-height: 300px; overflow-y: auto; }
    #panel {
      position: absolute; top: 0; right: -320px; width: 320px; height: 100vh;
      background: #111; overflow-y: auto; padding: 12px;
      border-left: 3px solid #e94560; user-select: none; z-index: 20;
    }
    #panel.visible { right: 0; }
    #panel h2 { font-size: 16px; margin: 8px 0 4px; color: #e94560; }
    #panel h3 { font-size: 13px; margin: 6px 0 2px; color: #f5a623; cursor: pointer; }
    .bone-group { margin-left: 8px; }
    .bone-row { display: flex; align-items: center; margin: 3px 0; font-size: 12px; }
    .bone-row label { width: 65px; flex-shrink: 0; color: #ddd; }
    .bone-row input[type="range"] { flex: 1; margin: 0 4px; accent-color: #e94560; }
    .bone-row .axis { width: 14px; color: #888; font-size: 11px; }
    .bone-row .val { width: 32px; color: #ccc; font-size: 11px; }
    button { background: #e94560; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; margin: 2px; }
    button.reset { background: #333; }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="info">加载中...</div>
    <div id="leftPanel" style="display:none;">
      <button id="resetCamBtn">归位</button>
      <button id="flyBtn">飞行模式</button>
      <div id="flySpeed">
        速度 <span id="flySpeedVal">1.0</span>x<br>
        <input type="range" id="flySpeedSlider" min="0.1" max="20" step="0.1" value="1" style="width:60px;accent-color:#2980b9;">
      </div>
      <div id="lightPanel">
        <div style="font-weight:bold;margin-bottom:4px;color:#f39c12;">💡 光源</div>
        <div style="margin:2px 0;"><span>环境光</span><input type="range" id="ambientSlider" min="0" max="1" step="0.01" value="0.4" style="width:60px;accent-color:#f39c12;"><span id="ambientVal">0.4</span></div>
        <button id="addLightBtn" style="background:#f39c12;margin:3px 0;font-size:10px;padding:2px 6px;">+ 添加光源</button>
        <div id="lightList"></div>
      </div>
    </div>
    <button id="toggleBtn" style="display:none;">☰</button>
  </div>
  <div id="panel"></div>
  <script type="module" src="/src/firefly.js"></script>
</body>
</html>
